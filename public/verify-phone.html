<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="styles.css"/>
  <title>Verify Phone</title>
  <style>
    #container{max-width:520px;margin:40px auto;padding:24px;background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
    button{background:#3374c9;color:#fff;border:none;padding:12px 18px;border-radius:8px;cursor:pointer;margin-top:10px}
    #msg{margin-top:12px;color:#333}
    .row{display:flex;gap:10px;align-items:center}
  </style>
</head>
<body>
  <div id="container">
    <h2>📱 Verify Phone</h2>

    <label for="phone">Phone Number (India, include country code):</label>
    <input id="phone" type="tel" placeholder="e.g. +919876543210" />

    <div class="row">
      <button type="button" onclick="sendPhoneOtp()">Send OTP</button>
    </div>

    <div id="recaptcha-container" style="margin:14px 0;"></div>

    <label for="otp">OTP:</label>
    <input id="otp" type="text" inputmode="numeric" placeholder="OTP" />

    <button type="button" onclick="verifyPhoneOtp()">Verify OTP</button>

    <div id="msg"></div>
    <div style="margin-top:12px">
      <a href="profile.html">Back to Profile</a>
    </div>
  </div>

  <!-- Firebase compat SDKs for phone auth -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <!-- You already store Firebase config in public/firebase.js; replicate here so this page works standalone -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD8kBdroSRvfTeo8d81SdA4inuY2-ogFaM",
      authDomain: "sahavahan.firebaseapp.com",
      projectId: "sahavahan",
      storageBucket: "sahavahan.firebasestorage.app",
      messagingSenderId: "383544725358",
      appId: "1:383544725358:web:c50801eeb1b038fd81bb7f",
      measurementId: "G-WS3KQQ0578"
    };

    firebase.initializeApp(firebaseConfig);

    window.recaptchaVerifier = null;
    window.confirmationResult = null;

    function ensureRecaptcha() {
      if (window.recaptchaVerifier) return window.recaptchaVerifier;
      window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
        'recaptcha-container',
        { size: 'normal' }
      );
      return window.recaptchaVerifier;
    }

    function setMsg(text, isError = false) {
      const el = document.getElementById('msg');
      el.style.color = isError ? '#b00020' : '#1b5e20';
      el.innerText = text;
    }

    async function sendPhoneOtp() {
      const phone = document.getElementById('phone').value.trim();
      if (!phone) return setMsg('Enter phone number', true);

      try {
        const appVerifier = ensureRecaptcha();

        setMsg('Sending OTP...');
        window.confirmationResult = await firebase
          .auth()
          .signInWithPhoneNumber(phone, appVerifier);

        setMsg('OTP Sent ✅');
      } catch (err) {
        console.error(err);
        setMsg(err?.message || 'Failed to send OTP', true);
      }
    }

    async function verifyPhoneOtp() {
      const otp = document.getElementById('otp').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!phone) return setMsg('Enter phone number', true);
      if (!otp) return setMsg('Enter OTP', true);
      if (!window.confirmationResult) return setMsg('Send OTP first', true);

      try {
        setMsg('Verifying...');

        const result = await window.confirmationResult.confirm(otp);
        const username = localStorage.getItem('username');

        if (!username) throw new Error('Missing username. Please login again.');

        const resp = await fetch('/api/users/verify-phone', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username,
            phoneNumber: phone,
            isVerified: true
          })
        });

        const data = await resp.json();
        if (!resp.ok) throw new Error(data?.message || 'Phone verification failed');

        setMsg('Phone Verified ✅');
        setTimeout(() => (window.location.href = 'profile.html'), 700);
      } catch (err) {
        console.error(err);
        setMsg(err?.message || 'Failed to verify OTP', true);
      }
    }
  </script>

  <script src="notification-badge.js"></script>
</body>
</html>
